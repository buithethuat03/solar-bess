        - if:
            required: [correctionOfId]
            properties:
              correctionOfId: {type: string, format: uuid}
          then:
            required: [reason]
            properties:
              reason: {type: string, maxLength: 2000}
        - if:
            required: [actualFinish]
            properties:
              actualFinish: {type: string, format: date}
          then:
            required: [actualStart, evidenceRefs]
            properties:
              actualStart: {type: string, format: date}
              evidenceRefs:
                type: array
                minItems: 1
                uniqueItems: true
                items: {type: string, maxLength: 200}
