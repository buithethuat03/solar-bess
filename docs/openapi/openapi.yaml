openapi: 3.1.0
jsonSchemaDialect: https://json-schema.org/draft/2020-12/schema
info:
  title: Solar & BESS Project Management Platform API
  version: 0.7.0
  description: >-
    Draft vendor-neutral contract. Unknown domain fields remain TBD. PM/O&M operations
    cannot start, stop, reset, bypass, clear source alarms, or send BESS/OT setpoints.
servers:
  - url: /
    description: Relative deployment URL; host and environment are TBD
tags:
  - name: "Identity & Tenant"
  - name: "Portfolio & Project"
  - name: "Opportunity"
  - name: "Project Controls"
  - name: "Risk & Change"
  - name: "Document Control"
  - name: "Contract & Cost"
  - name: "Engineering & Plants"
  - name: "Procurement & Logistics"
  - name: "Field, HSE & Quality"
  - name: "Commissioning & COD"
  - name: "Workflow"
  - name: "O&M"
  - name: "Integration"
  - name: "Webhook"
  - name: "AI Governance"
  - name: "Search & Reporting"
security:
  - bearerAuth: []
paths:
  "/v1/auth/login":
    post:
      tags: ["Identity & Tenant"]
      summary: "Đăng nhập local cho base/test profile"
      operationId: api_137_post_v1_auth_login
      x-api-id: "API-137"
      x-permission: "public"
      x-data-scope: "tenant resolved server-side from tenantCode"
      x-idempotency: "not required; rate limited"
      x-related-requirements: ["FR-147"]
      x-related-data: ["DB-001", "DB-005", "DB-099", "DB-100"]
      x-related-security: ["SEC-101", "SEC-103", "SEC-117", "SEC-118"]
      security: []
      parameters:
        - $ref: '#/components/parameters/CorrelationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/AuthLoginRequest'}
      responses:
        '200':
          description: "Authenticated; refresh JWT is set as HttpOnly cookie"
          headers:
            Set-Cookie:
              schema: {type: string}
              description: "refresh_token cookie; HttpOnly, SameSite=Lax, Path=/v1/auth"
          content:
            application/json:
              schema: {$ref: '#/components/schemas/AuthTokenResponse'}
        '400': {$ref: '#/components/responses/Error400'}
        '401': {$ref: '#/components/responses/Error401'}
        '429': {$ref: '#/components/responses/Error429'}
        '500': {$ref: '#/components/responses/Error500'}
  "/v1/auth/refresh":
    post:
