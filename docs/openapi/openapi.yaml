      summary: "Rotate refresh JWT và cấp access JWT mới"
      operationId: api_138_post_v1_auth_refresh
      x-api-id: "API-138"
      x-permission: "valid refresh session"
      x-data-scope: "signed tenant/user/session claims"
      x-idempotency: "single-use rotation"
      x-related-requirements: ["FR-147"]
      x-related-data: ["DB-005", "DB-100"]
      x-related-security: ["SEC-103", "SEC-117", "SEC-118"]
