components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token; base/test profile lifetime is 15 minutes. OIDC issuer/MFA remains a later milestone.
    mutualTLS:
      type: mutualTLS
      description: Gateway/service identity for approved inbound integration
    webhookSignature:
      type: apiKey
      in: header
      name: X-Webhook-Signature
      description: Signed timestamp/event payload; algorithm and rotation TBD
  parameters:
    TenantHeader:
      name: X-Tenant-Id
      in: header
      required: true
      schema:
        type: string
        minLength: 1
      description: Verified against authenticated entitlement
    CorrelationHeader:
      name: X-Correlation-Id
      in: header
      required: false
      schema:
        type: string
    RefreshCookie:
      name: refresh_token
      in: cookie
      required: false
      schema:
        type: string
      description: HttpOnly refresh JWT; clients must not expose it to JavaScript
    IdempotencyHeader:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 8
        maxLength: 200
    IfMatchHeader:
      name: If-Match
      in: header
      required: true
      schema:
        type: string
      description: Expected resource version
    RiskChangeCursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
        description: Opaque cursor; current version is a stable UUID but clients must not parse it
    RiskChangeLimit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 50
  schemas:
    AuthLoginRequest:
      type: object
      required: [tenantCode, email, password]
      properties:
        tenantCode: {type: string, minLength: 2, maxLength: 64}
        email: {type: string, format: email, maxLength: 254}
        password: {type: string, minLength: 8, maxLength: 200}
      additionalProperties: false
    AuthTokenResponse:
      type: object
      required: [accessToken, tokenType, expiresIn, user, tenant, correlationId]
      properties:
        accessToken:
          type: string
          description: Short-lived JWT; never log or persist in localStorage
        tokenType: {type: string, const: Bearer}
        expiresIn: {type: integer, const: 900}
        user:
          type: object
          required: [id, email, displayName]
          properties:
            id: {type: string, format: uuid}
            email: {type: string, format: email}
            displayName: {type: string}
          additionalProperties: false
        tenant:
          type: object
          required: [id, code, name]
          properties:
            id: {type: string, format: uuid}
            code: {type: string}
            name: {type: string}
          additionalProperties: false
        correlationId: {type: string}
      additionalProperties: false
    Envelope:
      type: object
      required: [correlationId]
      properties:
        data:
          description: Domain result; exact schema is operation-specific and TBD
        meta:
          type: object
          additionalProperties: true
        correlationId:
          type: string
    Company:
      type: object
      required: [id, code, name, organizationType, status]
      properties:
        id: {type: string, format: uuid}
        code: {type: string, pattern: '^[A-Z0-9][A-Z0-9_-]{1,63}$'}
        name: {type: string, minLength: 2, maxLength: 200}
        organizationType: {type: string, enum: [INTERNAL, CUSTOMER, PARTNER, CONTRACTOR, VENDOR, LENDER]}
        status: {type: string, enum: [ACTIVE, INACTIVE, ARCHIVED]}
      additionalProperties: false
    CreateCompanyRequest:
      type: object
      required: [code, name, organizationType]
      properties:
        code: {type: string, pattern: '^[A-Z0-9][A-Z0-9_-]{1,63}$'}
        name: {type: string, minLength: 2, maxLength: 200}
        organizationType: {type: string, enum: [INTERNAL, CUSTOMER, PARTNER, CONTRACTOR, VENDOR, LENDER]}
      additionalProperties: false
    LegalEntity:
      type: object
      required: [id, companyId, legalName, country, registrationNo, status]
      properties:
        id: {type: string, format: uuid}
        companyId: {type: string, format: uuid}
        legalName: {type: string, minLength: 2, maxLength: 250}
        country: {type: string, pattern: '^[A-Z]{2}$'}
        registrationNo: {type: string, minLength: 1, maxLength: 100}
        taxId: {type: [string, 'null'], maxLength: 100}
