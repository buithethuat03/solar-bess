        - if:
            required: [percentComplete]
            properties:
              percentComplete: {type: string, pattern: '^100(\.0{1,2})?$'}
          then:
            required: [actualStart, actualFinish, evidenceRefs]
            properties:
              actualStart: {type: string, format: date}
              actualFinish: {type: string, format: date}
