      oneOf:
        - required: [riskId]
          properties: {riskId: {type: string, format: uuid}, issueId: {type: 'null'}}
        - required: [issueId]
          properties: {riskId: {type: 'null'}, issueId: {type: string, format: uuid}}
      additionalProperties: false
    CreateRiskIssueActionRequest:
      type: object
      required: [title, ownerId, dueDate]
      properties:
        riskId: {type: string, format: uuid}
        issueId: {type: string, format: uuid}
        title: {type: string, minLength: 3, maxLength: 250}
        description: {type: string, maxLength: 4000}
        ownerId: {type: string, format: uuid}
        dueDate: {type: string, format: date}
        evidenceRefs: {type: array, uniqueItems: true, maxItems: 100, items: {$ref: '#/components/schemas/EvidenceReference'}}
      oneOf:
        - required: [riskId]
          not: {required: [issueId]}
        - required: [issueId]
          not: {required: [riskId]}
      additionalProperties: false
    UpdateRiskIssueActionRequest:
      type: object
      required: [expectedVersion]
      minProperties: 2
      properties:
        expectedVersion: {type: integer, minimum: 1}
        title: {type: string, minLength: 3, maxLength: 250}
        description: {type: [string, 'null'], maxLength: 4000}
        ownerId: {type: string, format: uuid}
        dueDate: {type: string, format: date}
        status: {$ref: '#/components/schemas/RiskIssueActionStatus'}
        evidenceRefs: {type: array, uniqueItems: true, maxItems: 100, items: {$ref: '#/components/schemas/EvidenceReference'}}
        residualAssessment: {$ref: '#/components/schemas/RiskResidualAssessment'}
      allOf:
        - if:
            required: [status]
            properties: {status: {const: COMPLETED}}
          then:
            required: [evidenceRefs]
            properties:
              evidenceRefs: {type: array, minItems: 1, uniqueItems: true, maxItems: 100, items: {$ref: '#/components/schemas/EvidenceReference'}}
      additionalProperties: false
    ChangeSource:
      type: object
      required: [type]
      properties:
        type: {$ref: '#/components/schemas/ChangeSourceType'}
        riskId: {type: string, format: uuid}
        issueId: {type: string, format: uuid}
      allOf:
        - if:
            required: [type]
            properties: {type: {const: RISK}}
          then:
            required: [riskId]
            not: {required: [issueId]}
        - if:
            required: [type]
            properties: {type: {const: ISSUE}}
          then:
            required: [issueId]
            not: {required: [riskId]}
        - if:
            required: [type]
            properties: {type: {const: MANUAL}}
          then:
            not:
              anyOf:
                - required: [riskId]
                - required: [issueId]
      additionalProperties: false
    TextImpactDimension:
      type: object
      required: [summary]
      properties:
        summary: {type: string, minLength: 3, maxLength: 4000}
      additionalProperties: false
    ScheduleImpactDimension:
      type: object
      required: [summary, durationDeltaDays, requiresRebaseline, affectedMilestoneIds]
      properties:
        summary: {type: string, minLength: 3, maxLength: 4000}
        durationDeltaDays: {type: integer, minimum: -3650, maximum: 3650}
        requiresRebaseline: {type: boolean}
        affectedMilestoneIds: {type: array, uniqueItems: true, maxItems: 500, items: {type: string, format: uuid}}
      additionalProperties: false
    CostImpactDimension:
      type: object
      required: [summary, amountDelta, currency]
      properties:
        summary: {type: string, minLength: 3, maxLength: 4000}
        amountDelta:
          type: string
          pattern: '^-?[0-9]{1,15}(\.[0-9]{1,4})?$'
          description: Decimal numeric(19,4), never a JSON floating-point number
        currency: {type: string, pattern: '^[A-Z]{3}$'}
      additionalProperties: false
    ChangeImpactDraft:
      type: object
      required: [schedule]
      properties:
        scope: {$ref: '#/components/schemas/TextImpactDimension'}
        schedule: {$ref: '#/components/schemas/ScheduleImpactDimension'}
        cost: {$ref: '#/components/schemas/CostImpactDimension'}
        quality: {$ref: '#/components/schemas/TextImpactDimension'}
        hse: {$ref: '#/components/schemas/TextImpactDimension'}
        contract: {$ref: '#/components/schemas/TextImpactDimension'}
      additionalProperties: false
    ChangeImpactSnapshot:
      type: object
      required: [scope, schedule, cost, quality, hse, contract]
      properties:
        scope: {$ref: '#/components/schemas/TextImpactDimension'}
        schedule: {$ref: '#/components/schemas/ScheduleImpactDimension'}
        cost: {$ref: '#/components/schemas/CostImpactDimension'}
        quality: {$ref: '#/components/schemas/TextImpactDimension'}
        hse: {$ref: '#/components/schemas/TextImpactDimension'}
        contract: {$ref: '#/components/schemas/TextImpactDimension'}
      additionalProperties: false
    ChangeRequest:
      type: object
      required: [id, projectId, packageId, code, title, reason, ownerId, sourceBaselineId, source, sourceEvidenceSnapshot, impactDraft, impactSnapshot, impactSnapshotHash, status, submittedBy, submittedAt, decisionVersion, approvedBy, approvedAt, decisionComment, scheduleImpactApproved, versionNo, createdAt, updatedAt]
      properties:
        id: {type: string, format: uuid}
        projectId: {type: string, format: uuid}
        packageId: {type: [string, 'null'], format: uuid, readOnly: true}
        code: {type: string, pattern: '^[A-Z0-9][A-Z0-9_.-]{1,79}$'}
        title: {type: string, minLength: 3, maxLength: 250}
        reason: {type: string, minLength: 3, maxLength: 4000}
        ownerId: {type: string, format: uuid}
        sourceBaselineId: {type: string, format: uuid}
        source: {$ref: '#/components/schemas/ChangeSource'}
        sourceEvidenceSnapshot: {type: array, uniqueItems: true, maxItems: 100, readOnly: true, items: {$ref: '#/components/schemas/EvidenceReference'}}
        impactDraft: {$ref: '#/components/schemas/ChangeImpactDraft'}
        impactSnapshot:
          oneOf:
            - $ref: '#/components/schemas/ChangeImpactSnapshot'
            - type: 'null'
        impactSnapshotHash: {type: [string, 'null'], pattern: '^[a-f0-9]{64}$', readOnly: true}
        status: {$ref: '#/components/schemas/ChangeRequestStatus'}
        submittedBy: {type: [string, 'null'], format: uuid, readOnly: true}
        submittedAt: {type: [string, 'null'], format: date-time, readOnly: true}
        decisionVersion: {type: [integer, 'null'], minimum: 1, readOnly: true}
        approvedBy: {type: [string, 'null'], format: uuid, readOnly: true}
        approvedAt: {type: [string, 'null'], format: date-time, readOnly: true}
        decisionComment: {type: [string, 'null'], readOnly: true}
        scheduleImpactApproved: {type: boolean, readOnly: true}
        versionNo: {type: integer, minimum: 1}
        createdAt: {type: string, format: date-time}
        updatedAt: {type: string, format: date-time}
      additionalProperties: false
    CreateChangeRequestRequest:
      type: object
      required: [code, title, reason, ownerId, sourceBaselineId, source, impact]
      properties:
        packageId: {type: string, format: uuid}
        code: {type: string, pattern: '^[A-Z0-9][A-Z0-9_.-]{1,79}$'}
        title: {type: string, minLength: 3, maxLength: 250}
        reason: {type: string, minLength: 3, maxLength: 4000}
        ownerId: {type: string, format: uuid}
        sourceBaselineId: {type: string, format: uuid}
        source: {$ref: '#/components/schemas/ChangeSource'}
        impact: {$ref: '#/components/schemas/ChangeImpactDraft'}
        evidenceRefs: {type: array, uniqueItems: true, maxItems: 100, items: {$ref: '#/components/schemas/EvidenceReference'}}
      additionalProperties: false
    UpdateChangeRequestRequest:
      type: object
      required: [expectedVersion, sourceBaselineId, impact]
      properties:
        expectedVersion: {type: integer, minimum: 1}
        title: {type: string, minLength: 3, maxLength: 250}
        reason: {type: string, minLength: 3, maxLength: 4000}
        ownerId: {type: string, format: uuid}
        sourceBaselineId: {type: string, format: uuid}
        impact: {$ref: '#/components/schemas/ChangeImpactDraft'}
        evidenceRefs: {type: array, uniqueItems: true, maxItems: 100, items: {$ref: '#/components/schemas/EvidenceReference'}}
        status: {type: string, enum: [DRAFT, ASSESSED]}
      additionalProperties: false
    SubmitChangeRequest:
      type: object
      required: [expectedVersion]
      properties:
        expectedVersion: {type: integer, minimum: 1}
        comment: {type: string, maxLength: 2000}
      additionalProperties: false
      description: Server requires all six current impact dimensions and freezes their canonical SHA-256 snapshot
    ChangeDecisionRequest:
      type: object
      required: [decision, expectedVersion]
      properties:
        decision: {$ref: '#/components/schemas/RiskChangeDecision'}
        expectedVersion: {type: integer, minimum: 1}
        comment: {type: string, minLength: 3, maxLength: 2000}
      allOf:
        - if:
            required: [decision]
            properties: {decision: {enum: [RETURN, REJECT]}}
          then:
            required: [comment]
      additionalProperties: false
    ClosureDecisionRequest:
      type: object
      required: [decision, expectedVersion, comment, evidenceRefs]
      properties:
        decision: {$ref: '#/components/schemas/RiskChangeDecision'}
        expectedVersion: {type: integer, minimum: 1}
        comment: {type: string, minLength: 3, maxLength: 2000}
        evidenceRefs: {type: array, minItems: 1, uniqueItems: true, maxItems: 100, items: {$ref: '#/components/schemas/EvidenceReference'}}
      additionalProperties: false
    RiskChangePageMeta:
      type: object
      required: [nextCursor, limit]
      properties:
        nextCursor: {type: [string, 'null']}
        limit: {type: integer, minimum: 1, maximum: 100}
      additionalProperties: false
    RiskCommandResponse:
      type: object
      required: [data, correlationId]
      properties:
        data: {$ref: '#/components/schemas/Risk'}
        correlationId: {type: string}
      additionalProperties: false
    IssueCommandResponse:
      type: object
      required: [data, correlationId]
      properties:
        data: {$ref: '#/components/schemas/Issue'}
        correlationId: {type: string}
      additionalProperties: false
    RiskIssueActionCommandResponse:
      type: object
      required: [data, correlationId]
      properties:
        data: {$ref: '#/components/schemas/RiskIssueAction'}
        correlationId: {type: string}
      additionalProperties: false
    ChangeRequestCommandResponse:
      type: object
      required: [data, correlationId]
      properties:
        data: {$ref: '#/components/schemas/ChangeRequest'}
        correlationId: {type: string}
      additionalProperties: false
    RiskListResponse:
      type: object
      required: [data, meta, correlationId]
      properties:
        data: {type: array, items: {$ref: '#/components/schemas/Risk'}}
        meta: {$ref: '#/components/schemas/RiskChangePageMeta'}
        correlationId: {type: string}
      additionalProperties: false
    IssueListResponse:
      type: object
      required: [data, meta, correlationId]
      properties:
        data: {type: array, items: {$ref: '#/components/schemas/Issue'}}
        meta: {$ref: '#/components/schemas/RiskChangePageMeta'}
        correlationId: {type: string}
      additionalProperties: false
    ChangeRequestListResponse:
      type: object
      required: [data, meta, correlationId]
      properties:
        data: {type: array, items: {$ref: '#/components/schemas/ChangeRequest'}}
        meta: {$ref: '#/components/schemas/RiskChangePageMeta'}
        correlationId: {type: string}
      additionalProperties: false
    RiskChangeSummary:
      type: object
      required: [riskTotal, highRiskCount, criticalRiskCount, issueTotal, criticalIssueCount, overdueActionCount, pendingChangeDecisionCount, topRisks, criticalIssues, overdueActions, pendingChangeRequests, calculatedAt]
      properties:
        riskTotal: {type: integer, minimum: 0}
        highRiskCount: {type: integer, minimum: 0}
        criticalRiskCount: {type: integer, minimum: 0}
        issueTotal: {type: integer, minimum: 0}
        criticalIssueCount: {type: integer, minimum: 0}
        overdueActionCount: {type: integer, minimum: 0}
        pendingChangeDecisionCount: {type: integer, minimum: 0}
        topRisks: {type: array, maxItems: 10, items: {$ref: '#/components/schemas/Risk'}}
        criticalIssues: {type: array, maxItems: 10, items: {$ref: '#/components/schemas/Issue'}}
        overdueActions: {type: array, maxItems: 10, items: {$ref: '#/components/schemas/RiskIssueAction'}}
        pendingChangeRequests: {type: array, maxItems: 10, items: {$ref: '#/components/schemas/ChangeRequest'}}
        calculatedAt: {type: string, format: date-time}
      additionalProperties: false
    RiskChangeSummaryResponse:
      type: object
      required: [data, correlationId]
      properties:
        data: {$ref: '#/components/schemas/RiskChangeSummary'}
        correlationId: {type: string}
      additionalProperties: false
    RiskChangeHistoryItem:
      type: object
      required: [id, sourceType, sourceId, eventType, actorId, effectiveActorId, versionNo, summary, occurredAt, correlationId]
      properties:
        id: {type: string, format: uuid}
        sourceType: {$ref: '#/components/schemas/RiskChangeSourceType'}
        sourceId: {type: string, format: uuid}
        eventType: {type: string, minLength: 1, maxLength: 100}
        actorId: {type: string, format: uuid}
        effectiveActorId: {type: [string, 'null'], format: uuid}
        versionNo: {type: integer, minimum: 1}
        summary: {type: string, maxLength: 2000, description: 'Safe redacted event summary, not raw audit payload'}
        occurredAt: {type: string, format: date-time}
        correlationId: {type: string}
      additionalProperties: false
    RiskChangeHistoryResponse:
      type: object
      required: [data, meta, correlationId]
      properties:
        data: {type: array, items: {$ref: '#/components/schemas/RiskChangeHistoryItem'}}
        meta: {$ref: '#/components/schemas/RiskChangePageMeta'}
        correlationId: {type: string}
      additionalProperties: false
    ScheduleBaselineListResponse:
      type: object
      required: [data, meta, correlationId]
      properties:
        data: {type: array, items: {$ref: '#/components/schemas/ScheduleBaseline'}}
        meta: {$ref: '#/components/schemas/RiskChangePageMeta'}
        correlationId: {type: string}
      additionalProperties: false
    GenericCommand:
      type: object
      required: [commandType, data]
      properties:
        commandType:
          type: string
        expectedVersion:
          type: integer
          minimum: 0
        reason:
          type: string
          maxLength: 2000
        data:
          type: object
          additionalProperties: true
      additionalProperties: false
    UploadInitiateRequest:
      type: object
      required: [fileName, size, mimeType]
      properties:
        fileName: {type: string, maxLength: 500}
        size: {type: integer, minimum: 1}
        mimeType: {type: string}
        expectedHash: {type: string}
      additionalProperties: false
    UploadFinalizeRequest:
      type: object
      required: [uploadToken, contentHash]
      properties:
        uploadToken: {type: string}
        contentHash: {type: string}
        revisionCode: {type: string}
      additionalProperties: false
    TelemetryEnvelope:
      type: object
      required: [gatewayId, events]
      properties:
        gatewayId: {type: string}
        batchId: {type: string}
        events:
          type: array
          items:
            type: object
            required: [externalEventId, sourceTimestamp, quality]
            properties:
              externalEventId: {type: string}
              tagId: {type: string}
              sourceTimestamp: {type: string, format: date-time}
              sequence: {type: integer}
              value: {}
              unit: {type: string}
              quality: {type: string}
            additionalProperties: false
      additionalProperties: false
      description: Inbound measurements/events only; command/control fields are prohibited
    Error:
      type: object
      required: [code, message, correlationId, retryable]
      properties:
        code: {type: string}
        message: {type: string}
        correlationId: {type: string}
        retryable: {type: boolean}
        fieldErrors:
          type: array
          items:
            type: object
            properties:
              field: {type: string}
              code: {type: string}
              message: {type: string}
    WebhookEvent:
      type: object
      required: [eventId, eventType, eventVersion, occurredAt, objectRef, correlationId]
      properties:
        eventId: {type: string}
        eventType: {type: string}
        eventVersion: {type: string}
        occurredAt: {type: string, format: date-time}
        objectRef:
          type: object
          additionalProperties: true
        correlationId: {type: string}
  responses:
    Error400:
      description: "Invalid request"
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Error401:
      description: "Authentication required"
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Error403:
      description: "Denied by policy"
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Error404:
      description: "Tenant-scoped resource not found"
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Error409:
      description: "State, version or idempotency conflict"
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Error422:
      description: "Domain validation or quarantine"
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Error429:
      description: "Rate limited"
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Error500:
      description: "Opaque internal error"
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
